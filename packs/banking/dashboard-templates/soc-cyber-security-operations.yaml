      - threat_intel
    type: mitre_attack_matrix
  - id: threat-heat
    title: Threat heat map
    query:
      source: provider
      dataClass: security_events
      scope:
        level: tenant
      aggregation: latest
      window: 24h
      filters: []
    requiredDataClasses:
      - security_events
    type: heat_map
    xDimension: tactic
    yDimension: asset
  - id: attack-tl
    title: Attack timeline
    query:
      source: provider
      dataClass: security_events
      scope:
        level: tenant
      aggregation: latest
